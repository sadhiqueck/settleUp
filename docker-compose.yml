services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: settleup
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d settleup"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/settleup?schema=public
      - FRONTEND_URL=https://app.sqck.online
    depends_on:
      postgres:
        condition: service_healthy
    # volumes: # 
    #   - .:/app
    #   - /app/node_modules # (Keeps the container's node_modules safe)

    # We override the CMD to ensure the database is seeded/pushed before starting the NestJS server.
    command: sh -c "pnpm --filter @settleup/api exec prisma db push && pnpm --filter @settleup/api dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://api.sqck.online/
    depends_on:
      - api
    # volumes:
    #   - .:/app
    #   - /app/node_modules

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - web
      - api

volumes:
  db-data:
